disallowed-types = [
    { path = "std::collections::HashMap", reason = "Use rustc_hash::FxHashMap for better performance" },
    { path = "std::collections::HashSet", reason = "Use rustc_hash::FxHashSet for better performance" },
]

# Process spawning is allowed at workspace level, then re-denied by the core,
# extract, graph, and engine crates. Core, extract, and graph never spawn
# processes. Engine permits only narrowly expected, engine-owned Git wrappers.
# CLI and MCP legitimately spawn worktrees, sidecars, and subprocesses outside
# the analysis core, so they keep the workspace-level allow.
disallowed-methods = [
    { path = "std::process::Command::new", reason = "Analysis crates forbid process spawning except narrowly expected engine-owned Git wrappers; the deny is scoped by crate-root attributes" },
]

# Maximum nesting depth before clippy::excessive_nesting fires.
# Catches deeply nested control flow that should be refactored.
excessive-nesting-threshold = 7

# SIG Unit Size: functions >100 LOC are flagged.
# SIG thresholds: >60 LOC = "very high risk". Ratcheted from 150 to 100
# to keep the worst-offender ceiling tightening over time.
too-many-lines-threshold = 100

# SIG Unit Interfacing: ratcheted from 7 to 6 so the 7-parameter outliers
# get bundled into context structs. SIG 4-star cert wants <=2; 6 is the
# pragmatic project ceiling matching the unit-size ratchet posture.
too-many-arguments-threshold = 6

# SIG Unit Complexity: cognitive complexity >25 = "very high risk".
# This is the clippy default and matches SIG's CC threshold.
cognitive-complexity-threshold = 25
