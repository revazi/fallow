name: Coverage

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      badge_color: ${{ steps.badge.outputs.color }}
      percentage: ${{ steps.compute.outputs.percentage }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust

      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-llvm-cov

      - name: Build CLI binary for e2e tests
        run: cargo build -p fallow-cli

      - name: Run tests with coverage
        env:
          FALLOW_BIN: ${{ github.workspace }}/target/debug/fallow
        run: |
          mkdir -p coverage
          cargo llvm-cov --workspace --lcov --output-path coverage/lcov.info

      - name: Compute coverage
        id: compute
        run: |
          COVERAGE=$(awk -F: '
            /^LF:/ { total += $2 }
            /^LH:/ { hit += $2 }
            END { if (total > 0) printf "%.1f", (hit/total)*100; else print "0" }
          ' coverage/lcov.info)
          echo "COVERAGE=$COVERAGE" >> "$GITHUB_ENV"
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "Coverage: $COVERAGE%"

      - name: Enforce coverage floor
        # Hard gate: fail if workspace line coverage drops below the floor.
        # Ratcheted upward over time; raise only, never lower. Current main ~92.7%.
        run: |
          FLOOR=92.0
          awk -v cov="$COVERAGE" -v floor="$FLOOR" 'BEGIN {
            if (cov + 0 < floor + 0) {
              printf "FAIL: coverage %.1f%% is below the floor of %.1f%%\n", cov, floor
              exit 1
            }
            printf "OK: coverage %.1f%% meets the floor of %.1f%%\n", cov, floor
          }'

      - name: Compute badge color
        id: badge
        run: |
          int=${COVERAGE%.*}
          if [ "$int" -ge 90 ]; then color="brightgreen"
          elif [ "$int" -ge 80 ]; then color="green"
          elif [ "$int" -ge 70 ]; then color="yellowgreen"
          elif [ "$int" -ge 60 ]; then color="yellow"
          elif [ "$int" -ge 50 ]; then color="orange"
          else color="red"
          fi
          echo "BADGE_COLOR=$color" >> "$GITHUB_ENV"
          echo "color=$color" >> "$GITHUB_OUTPUT"

      - name: Write coverage metrics
        run: |
          python3 -c "
          import json
          data = [{'name': 'Code Coverage', 'unit': '%', 'value': float('${COVERAGE:-0}')}]
          print(json.dumps(data, indent=2))
          " > coverage-bench.json

      - name: Upload coverage publication input
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-publication
          path: coverage-bench.json
          retention-days: 1

  publish:
    name: Publish coverage
    needs: coverage
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BADGE_COLOR: ${{ needs.coverage.outputs.badge_color }}
      COVERAGE: ${{ needs.coverage.outputs.percentage }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download coverage publication input
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          name: coverage-publication

      - name: Store coverage metrics
        uses: ./.github/actions/store-benchmark
        with:
          name: Fallow Coverage
          tool: customBiggerIsBetter
          output-file-path: coverage-bench.json
          data-dir: coverage
          alert-threshold: '105%'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update coverage badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin badges
          git worktree add /tmp/badges --detach origin/badges
          cd /tmp/badges
          git checkout -B badges origin/badges

          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${COVERAGE}%\",\"color\":\"${BADGE_COLOR}\"}" > coverage.json

          git add coverage.json
          git diff --cached --quiet || git commit -m "chore: update coverage badge to ${COVERAGE}%"
          git push origin badges

          cd "$GITHUB_WORKSPACE"
          git worktree remove /tmp/badges
